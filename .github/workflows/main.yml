name: EduRadar Main Workflow

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  SUPABASE_VIDEO_BUCKET: ${{ secrets.SUPABASE_VIDEO_BUCKET }}
  MY_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}

jobs:
  orchestrator:
    runs-on: ubuntu-latest
    outputs:
      # Semplifichiamo gli output per evitare l'errore rosso
      status: ${{ steps.orchestrate.outcome }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: pip install -r requirements.txt
      - name: Run Orchestrator
        id: orchestrate
        run: python orchestrator.py

  worker_1:
    needs: orchestrator
    # Facciamo partire il worker se l'orchestratore ha avuto successo
    if: needs.orchestrator.result == 'success'
    runs-on: ubuntu-latest
    env:
      GOOGLE_COOKIES: ${{ secrets.WORKER_1_COOKIES }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
      - name: Get News and Run
        run: |
          # Il worker cercherà da solo se ci sono notizie in "processing" su Supabase
          python worker_task.py --worker-id 1
