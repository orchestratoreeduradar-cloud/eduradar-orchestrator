name: EduRadar Worker Runner

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Ti permette di avviarlo manualmente da GitHub

jobs:
  run-worker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Velocizza le esecuzioni successive

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Installiamo playwright separatamente per sicurezza
          pip install playwright

      - name: Install Playwright Browsers
        run: |
          # Installa solo Chromium per risparmiare tempo e spazio
          playwright install chromium --with-deps

      - name: Run Worker Script
        env:
          # Qui passiamo il segreto JSON all'ambiente di sistema
          NOTEBOOKLM_AUTH_JSON: ${{ secrets.NOTEBOOKLM_AUTH_JSON }}
          # Aggiungi qui altri segreti se servono (es. API Keys)
          # OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # Avvia il tuo script (cambia worker.py con il nome del tuo file)
          python worker_task.py
