name: EduRadar Worker Runner

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Ti permette di avviarlo manualmente da GitHub

jobs:
  run-worker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Velocizza le esecuzioni successive

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Installiamo playwright separatamente per sicurezza
          pip install playwright

      - name: Install Playwright Browsers
        run: |
          # Installa solo Chromium per risparmiare tempo e spazio
          playwright install chromium --with-deps

      - name: Run Worker Script
        env:
          # Segreto per NotebookLM
          NOTEBOOKLM_AUTH_JSON: ${{ secrets.NOTEBOOKLM_AUTH_JSON }}
          
          # Segreti per Supabase (CONTROLLA CHE I NOMI SIANO IDENTICI A QUELLI SU GITHUB)
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_VIDEO_BUCKET: ${{ secrets.SUPABASE_VIDEO_BUCKET }}
          
          # Altre variabili necessarie al tuo script
          WORKER_ID: 1 
          NEWS_URL: "https://esempio.com" # Qui poi dovrai gestire come passare l'URL reale
        run: |
          python worker_task.py
